<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Access - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* NEW STYLING: Matching the Student card structure but with Teacher colors */
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .auth-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        /* Teacher uses a dark background for authority */
        .auth-header { background: #2c3e50; color: white; padding: 40px; text-align: center; } 
        .btn-primary { background: #2c3e50; border: none; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-primary:hover { background: #34495e; }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card auth-card w-100" style="max-width: 450px;">
        <div class="auth-header">
            <h2 class="fw-bold">Teacher Access</h2>
            <p class="mb-0 opacity-75">Secure Access to QR Sessions</p>
        </div>
        
        <div class="card-body p-4">
            <form action="/login" method="POST">
                <input type="hidden" name="role_type" value="Teacher">
                
                <div class="mb-3">
                    <label class="form-label small fw-bold">Staff ID</label>
                    <input type="text" name="prn" class="form-control" placeholder="Enter Staff ID" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold">Select Subject for QR</label>
                    <select name="subject" class="form-select" required>
                        <option value="Python Programming">Python Programming</option>
                        <option value="DBMS">DBMS</option>
                        <option value="Java Development">Java Development</option>
                        <option value="Web Tech">Web Tech</option>
                        
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Start Session</button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="/" class="text-decoration-none text-muted small">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
