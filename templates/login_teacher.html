<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Access - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .auth-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .auth-header { background: #2c3e50; color: white; padding: 40px; text-align: center; } 
        .btn-primary { background: #2c3e50; border: none; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-primary:hover { background: #34495e; }
        /* Real-time subject preview styling */
        #subject-preview { font-weight: 600; color: #2c3e50; min-height: 20px; }
        /* Style for the side-by-side buttons */
        .btn-check:checked + .btn-outline-primary { background-color: #2c3e50; color: white; border-color: #2c3e50; }
        .btn-outline-primary { color: #2c3e50; border-color: #2c3e50; }
        .btn-outline-primary:hover { background-color: #34495e; color: white; border-color: #34495e; }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card auth-card w-100" style="max-width: 450px;">
        <div class="auth-header">
            <h2 class="fw-bold">Teacher Access</h2>
            <p class="mb-0 opacity-75">Secure Access to QR Sessions</p>
        </div>
        
        <div class="card-body p-4">
            {% if error %}
            <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="mb-4">
                    <label class="form-label small fw-bold d-block text-center">Login as...</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="role_type" id="role_teacher" value="Teacher" checked onclick="toggleTeacherFields('Teacher')">
                        <label class="btn btn-outline-primary" for="role_teacher">Teacher</label>

                        <input type="radio" class="btn-check" name="role_type" id="role_admin" value="Admin" onclick="toggleTeacherFields('Admin')">
                        <label class="btn btn-outline-primary" for="role_admin">Administrator</label>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold">Staff ID</label>
                    <input type="text" name="prn" id="staff_id" class="form-control" placeholder="Enter ID" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                
                <div id="teacher_fields">
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Select Class / Year</label>
                        <select name="class_year" id="class_year" class="form-select" onchange="fetchSubject()" required>
                            <option value="" selected disabled>Choose Year...</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                        </select>
                        <div id="subject-preview" class="mt-3 text-primary small"></div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Start Session</button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="/" class="text-decoration-none text-muted small">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<script>
    function fetchSubject() {
        const staffId = document.getElementById('staff_id').value;
        const year = document.getElementById('class_year').value;
        const preview = document.getElementById('subject-preview');

        if (!staffId) {
            alert("Please enter your Staff ID first!");
            document.getElementById('class_year').value = ""; 
            return;
        }

        fetch(`/get_assigned_subject?staff_id=${staffId}&year=${year}`)
            .then(response => response.json())
            .then(data => {
                if (data.subject) {
                    preview.innerText = "Assigned Subject: " + data.subject;
                    preview.className = "mt-3 text-success small fw-bold";
                } else {
                    preview.innerText = "No subject assigned for this year.";
                    preview.className = "mt-3 text-danger small";
                }
            })
            .catch(err => {
                console.error("Error fetching subject:", err);
            });
    }

    // UPDATED TOGGLE LOGIC FOR SIDE-BY-SIDE BUTTONS
    function toggleTeacherFields(role) {
        const teacherSection = document.getElementById('teacher_fields');
        const classSelect = document.getElementById('class_year');
        const previewDiv = document.getElementById('subject-preview');

        if (role === 'Admin') {
            teacherSection.style.display = 'none';
            classSelect.removeAttribute('required');
            previewDiv.innerText = ""; // Clear preview when switching
        } else {
            teacherSection.style.display = 'block';
            classSelect.setAttribute('required', 'required');
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
