<!DOCTYPE html>
<html>
<head>
    <title>Live QR - {{ subject }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white text-center">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Smart Attendance Portal</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
                <a href="/report" class="btn btn-outline-light btn-sm me-2">View Reports</a>
                
            </div>
        </div>
    </nav><hr>

    <div class="container mt-5">
        <h1 class="fw-bold">{{ subject }}</h1>
        <p class="text-secondary">Scanning allowed only in classroom range</p>
        
        <div class="bg-white d-inline-block p-4 rounded-4 shadow-lg mt-3">
            <img id="qrImage" src="" alt="QR Code" style="width: 325px;">
        </div>

        <div class="mt-4">
            <p id="timer" class="badge bg-primary fs-5">Refreshing in: 15s</p>
        </div>
        
        <a href="/logout" class="btn btn-outline-danger mt-3" style="border-radius: 8px; padding: 10px 20px;">
    Stop Session & Logout </a>
    </div>

    <script>
        let timeLeft = 15;
        const subject = "{{ subject }}";

        function refreshQR() {
            fetch('/generate_qr_api?subject=' + encodeURIComponent(subject))
            .then(res => res.json())
            .then(data => {
                document.getElementById('qrImage').src = "data:image/png;base64," + data.qr_code;
                timeLeft = 15; // Reset timer
            });
        }

        setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = "Refreshing in: " + timeLeft + "s";
            if (timeLeft <= 0) refreshQR();
        }, 1000);

        window.onload = refreshQR; // Load first QR immediately
    </script>
</body>
</html>
