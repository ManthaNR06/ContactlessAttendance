<!DOCTYPE html>
<html>
<head>
    <title>Live QR - {{ subject }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    #live-counter-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        text-align: center;
        z-index: 1000;
        color: white; /* Text color for dark background */
    }

    #student-counter {
        display: block;
        font-size: 3.5rem; /* Larger font size */
        font-weight: bold;
        color: rgb(47, 0, 255); /* Primary blue color */
        line-height: 1;
        transition: transform 0.3s ease, color 0.3s ease;
    }
</style>

</style>
</head>

<body class="bg-dark text-white text-center">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Smart Attendance Portal</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
                <a href="/report" class="btn btn-outline-light btn-sm me-2">View Reports</a>
                
            </div>
        </div>
    </nav><hr>

  <div id="live-counter-container">
    <div class="small opacity-75">Today's Attendance</div>
    <div id="student-counter">0</div>
    <div class="small text-success">
        <span class="spinner-grow spinner-grow-sm"></span> Live
    </div>
</div>

    <div class="container mt-5">
        <h1 class="fw-bold">{{ subject }}</h1>
        <p class="text-secondary">Scanning allowed only in classroom range</p>
        
        <div class="bg-white d-inline-block p-4 rounded-4 shadow-lg mt-3">
            <img id="qrImage" src="" alt="QR Code" style="width: 325px;">
        </div>

        <div class="mt-4">
            <p id="timer" class="badge bg-primary fs-5">Refreshing in: 15s</p>
        </div>
        
        <a href="/logout" class="btn btn-outline-danger mt-3" style="border-radius: 8px; padding: 10px 20px;">
    Stop Session & Logout </a>
    </div>

    <script>
        let timeLeft = 15;
        const subject = "{{ subject }}";

        function refreshQR() {
            fetch('/generate_qr_api?subject=' + encodeURIComponent(subject))
            .then(res => res.json())
            .then(data => {
                document.getElementById('qrImage').src = "data:image/png;base64," + data.qr_code;
                timeLeft = 15; // Reset timer
            });
        }

        setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = "Refreshing in: " + timeLeft + "s";
            if (timeLeft <= 0) refreshQR();
        }, 1000);

        window.onload = refreshQR; // Load first QR immediately

    let lastCount = 0; // Tracks the count from the previous check

function updateLiveCount() {
    const subject = "{{ subject }}"; 
    
    fetch(`/api/student_count/${subject}`)
        .then(response => response.json())
        .then(data => {
            const counterElement = document.getElementById('student-counter');
            const newCount = data.count;

            if (counterElement) {
                // If a new student is detected
                if (newCount > lastCount) {
                    // Trigger Visual Alert: Turn green and pop out
                    counterElement.style.color = "#198754"; // Bootstrap Success Green
                    counterElement.style.transform = "scale(1.3)";
                    counterElement.style.transition = "all 0.3s ease";
                    
                    // Reset to normal after 500ms
                    setTimeout(() => {
                        counterElement.style.color = "#0d6efd"; // Original Blue
                        counterElement.style.transform = "scale(1)";
                    }, 500);
                }
                
                counterElement.innerText = newCount;
                lastCount = newCount; 
            }
        })
        .catch(err => console.error("Counter Error:", err));
}

// Check every 3 seconds
setInterval(updateLiveCount, 3000);
updateLiveCount();
    </script>
</body>
</html>
