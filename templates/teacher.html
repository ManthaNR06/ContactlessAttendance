<!DOCTYPE html>
<html>
<head>
    <title>Teacher Portal - Select Subject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .teacher-card { max-width: 600px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .qr-box { margin-top: 20px; padding: 20px; border: 2px dashed #ddd; border-radius: 10px; }
        #qrImage { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="teacher-card">
            <h2 class="fw-bold mb-4">Generate Attendance QR</h2>
            
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">Select Lecture Subject</label>
                <select id="subjectSelect" class="form-select form-select-lg">
                    <option value="Python Programming">Python Programming</option>
                    <option value="Java Development">Java Development</option>
                    <option value="Database Management">Database Management</option>
                    <option value="Web Technologies">Web Technologies</option>
                    <option value="Software Engineering">Software Engineering</option>
                </select>
            </div>

            <button onclick="generateNewQR()" class="btn btn-primary btn-lg w-100 mb-3">
                Refresh QR Code
            </button>

            <div class="qr-box">
                <img id="qrImage" src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
                <p class="mt-3 text-muted">Current Subject: <span id="currentSubject" class="fw-bold text-dark">Python Programming</span></p>
            </div>
            
            <div class="mt-4">
                <a href="/report" class="btn btn-outline-secondary">View Live Attendance Report</a>
            </div>
        </div>
    </div>

    <script>
        function generateNewQR() {
            const subject = document.getElementById('subjectSelect').value;
            
            // Fetch a new QR token from the server for the selected subject
            fetch('/generate_qr?subject=' + encodeURIComponent(subject))
            .then(response => response.json())
            .then(data => {
                document.getElementById('qrImage').src = "data:image/png;base64," + data.qr_code;
                document.getElementById('currentSubject').innerText = subject;
            });
        }
    </script>
</body>
</html>
