<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* NEW STYLING: Matching the screenshot */
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .auth-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; text-align: center; }
        .btn-primary { background: #764ba2; border: none; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-primary:hover { background: #667eea; }
        
        /* Tab Styling */
        .nav-tabs { border-bottom: none; }
        .nav-tabs .nav-link { color: #6c757d; font-weight: 600; border: none; background: transparent; }
        .nav-tabs .nav-link.active { color: #764ba2; border-bottom: 3px solid #764ba2; background: transparent; }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card auth-card w-100" style="max-width: 450px;">
        <div class="auth-header">
            <h2 class="fw-bold">Student Portal</h2>
            <p class="mb-0 opacity-75">Access your attendance stats & history</p>
        </div>
        
        <div class="card-body p-4">
            <ul class="nav nav-tabs mb-4 justify-content-center">
                <li class="nav-item">
                    <button class="nav-link active">Sign In</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="location.href='/register_face'">New Account</button>
                </li>
            </ul>

            <form action="/login" method="POST">
                <input type="hidden" name="role_type" value="Student">
                
                <div class="mb-3">
                    <label class="form-label small fw-bold">ID / PRN Number</label>
                    <input type="text" name="prn" class="form-control" placeholder="Enter PRN" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Submit</button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="/" class="text-decoration-none text-muted small">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
