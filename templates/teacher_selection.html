<!DOCTYPE html>
<html>
<head>
    <title>Teacher - Select Subject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column" style="height: 100vh;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark w-100">
        <div class="container">
            <a class="navbar-brand" href="/">Smart Attendance Portal</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
                <a href="/login" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="container card shadow p-4" style="max-width: 400px;">
            <h3 class="text-center mb-4">Start Attendance</h3>
            <form method="POST">
                <label class="form-label text-secondary">Select Subject</label>
                <select name="subject" class="form-select mb-4" required>
                    <option value="Python Programming">Python Programming</option>
                    <option value="Java Development">Java Development</option>
                    <option value="DBMS">DBMS</option>
                    <option value="Web Tech">Web Tech</option>
                </select>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Generate QR Code</button>
            </form>
        </div>
    </div>
</body>
</html>
