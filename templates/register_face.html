<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Student Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .reg-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .video-box { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #222; border: 4px solid #dee2e6; margin-bottom: 1.5rem; }
        #video, #photo-preview { width: 100%; display: block; transform: scaleX(-1); border-radius: 12px; }
        .capture-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 220px; border: 3px dashed rgba(255,255,255,0.5);
            border-radius: 50%; pointer-events: none; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
        }
        .form-control, .form-select { border-radius: 10px; padding: 12px; margin-bottom: 12px; border: 1px solid #ced4da; }
        .form-label { font-size: 0.9rem; color: #495057; display: block; text-align: left; }
    </style>
</head>
<body>

<div class="reg-card">
    <h3 class="fw-bold mb-3">Create Student Account</h3>
    
    <div id="form-fields">
        <input type="text" id="fullname" class="form-control" placeholder="Full Name" required>
        <input type="text" id="prn" class="form-control" placeholder="PRN (Login ID)" required>
        
        <div class="mb-2 text-start">
            <label class="form-label fw-bold mb-1">Select Academic Year</label>
            <select id="class_year" class="form-select shadow-sm">
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
            </select>
        </div>

        <input type="text" id="rollno" class="form-control" placeholder="Roll No" required>
        <input type="password" id="pass" class="form-control mb-3" placeholder="Password" required>
    </div>

    <div id="camera-section">
        <div class="video-box">
            <video id="video" autoplay playsinline></video>
            <div class="capture-circle"></div>
        </div>
        <button type="button" class="btn btn-primary btn-lg w-100 shadow-sm" onclick="takePreview()">
            Capture Face
        </button>
    </div>

    <div id="preview-section" style="display: none;">
        <img id="photo-preview" src="" alt="Capture Preview" class="mb-3">
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-danger w-50" onclick="retake()">Retake</button>
            <button type="button" class="btn btn-success w-50" onclick="submitRegistration()">Register</button>
        </div>
    </div>
    
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <div id="status" class="mt-3 fw-bold"></div>
    
    <div class="mt-4">
        <a href="/login_student" class="text-decoration-none text-muted small">Already have an account? Login</a>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusMsg = document.getElementById('status');
    let finalImageData = null;

    // SHORT DEV-ID HASHING LOGIC
    function getShortDeviceID() {
        const rawId = navigator.platform + window.screen.width + "x" + window.screen.height + navigator.hardwareConcurrency;
        let hash = 0;
        for (let i = 0; i < rawId.length; i++) {
            hash = ((hash << 5) - hash) + rawId.charCodeAt(i);
            hash |= 0;
        }
        return "DEV-" + Math.abs(hash).toString(16).toUpperCase();
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
        } catch (err) {
            statusMsg.innerText = "Error: Camera access denied.";
            statusMsg.className = "mt-3 text-danger";
        }
    }

    function takePreview() {
        if (video.videoWidth === 0) return alert("Camera not ready!");
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        finalImageData = canvas.toDataURL('image/jpeg', 0.9);
        document.getElementById('photo-preview').src = finalImageData;
        document.getElementById('camera-section').style.display = 'none';
        document.getElementById('preview-section').style.display = 'block';
        document.getElementById('form-fields').style.opacity = '0.5';
    }

    function retake() {
        document.getElementById('camera-section').style.display = 'block';
        document.getElementById('preview-section').style.display = 'none';
        document.getElementById('form-fields').style.opacity = '1';
        finalImageData = null;
    }

    function submitRegistration() {
        const fullName = document.getElementById('fullname').value;
        const prn = document.getElementById('prn').value;
        const rollNo = document.getElementById('rollno').value;
        const classYear = document.getElementById('class_year').value;
        const password = document.getElementById('pass').value;

        if (!fullName || !prn || !rollNo || !classYear || !password || !finalImageData) {
            alert("Please fill all details and capture your face!");
            return;
        }

        const deviceID = getShortDeviceID();

        statusMsg.innerText = "Saving Account...";
        statusMsg.className = "mt-3 text-primary";

        fetch('/register_face', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fullname: fullName, 
                prn: prn, 
                rollno: rollNo, 
                class_year: classYear, 
                password: password, 
                image: finalImageData, 
                device_fingerprint: deviceID 
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                statusMsg.innerText = "Success! Account Created.";
                statusMsg.className = "mt-3 text-success";
                setTimeout(() => { window.location.href = "/login_student"; }, 1500);
            } else {
                statusMsg.innerText = "Error: " + (data.message || "Registration failed");
                statusMsg.className = "mt-3 text-danger";
            }
        })
    }
    window.onload = initCamera;
</script>
</body>
</html>
