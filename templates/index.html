<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; height: 100vh; display: flex; align-items: center; }
        .card-portal { transition: transform 0.3s; cursor: pointer; border: none; border-radius: 20px; }
        .card-portal:hover { transform: translateY(-10px); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Smart Attendance</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/teacher">Teacher Portal</a>
      <a class="nav-link" href="/login">Student Login</a>
      <a class="nav-link" href="/report">View Reports</a>
    </div>
  </div>
</nav>

    <div class="hero-section">
        <div class="container text-center">
            <h1 class="display-3 fw-bold mb-4">Contactless Attendance</h1>
            <p class="lead mb-5">Secure, Location-Verified, and Real-Time.</p>
            
            <div class="row justify-content-center g-4">
                <div class="col-md-4">
                    <div class="card card-portal shadow-lg p-4 text-dark" onclick="location.href='/teacher'">
                        <div class="display-4 mb-3">👨‍🏫</div>
                        <h3>Teacher Portal</h3>
                        <p class="text-muted">Generate secure QR codes and manage class sessions.</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-portal shadow-lg p-4 text-dark" onclick="location.href='/login'">
                        <div class="display-4 mb-3">📱</div>
                        <h3>Student Portal</h3>
                        <p class="text-muted">Log in and scan to mark your attendance via GPS.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
