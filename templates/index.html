<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Updated to match your screenshot exactly */
        body { margin: 0; padding: 0; }
        
        .hero-section { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .navbar {
            background-color: #212529 !important; /* Match the dark nav in image */
            padding: 10px 0;
        }

        .card-portal { 
            transition: transform 0.3s; 
            cursor: pointer; 
            border: none; 
            border-radius: 25px; /* Softer rounded corners from image */
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-portal:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2) !important;
        }

        .display-4 { font-size: 3.5rem; }
        
        h1.display-3 {
            font-size: 4.5rem; /* Larger bold heading from image */
            letter-spacing: -1px;
        }

        .lead {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Adjusting link colors to match screenshot */
        .nav-link {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7) !important;
            margin-left: 15px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-normal" href="/">Smart Attendance</a>
    <div class="ms-auto d-flex">
      <a class="nav-link" href="/login_teacher">Teacher Portal</a>
      <a class="nav-link" href="/login_student">Student Login</a>
      
    </div>
  </div>
</nav>

    <div class="hero-section">
        <div class="container text-center">
            <h1 class="display-3 fw-bold mb-3">Contactless Attendance</h1>
            <p class="lead mb-5">Secure, Location-Verified, and Real-Time.</p>
            
            <div class="row justify-content-center g-5">
                <div class="col-md-5 col-lg-4">
                    <div class="card card-portal shadow-lg p-5 text-dark" onclick="location.href='/login_teacher'">
                        <div class="display-4 mb-3">👨‍🏫</div>
                        <h3 class="fw-bold">Teacher Portal</h3>
                        <p class="text-muted mb-0">Generate QR codes and manage class sessions.</p>
                    </div>
                </div>
                <div class="col-md-5 col-lg-4">
                    <div class="card card-portal shadow-lg p-5 text-dark" onclick="location.href='/login_student'">
                        <div class="display-4 mb-3">📱</div>
                        <h3 class="fw-bold">Student Portal</h3>
                        <p class="text-muted mb-0">Access your attendance stats, percentage & history.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
