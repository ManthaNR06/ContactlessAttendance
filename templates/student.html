<!DOCTYPE html>
<html>
<head>
    <title>Attendance Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Smart Attendance</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/teacher">Teacher Portal</a>
      <a class="nav-link" href="/login">Student Login</a>
      <a class="nav-link" href="/report">View Reports</a>
    </div>
  </div>
</nav>

    <div class="container py-5 text-center">
        <div class="card shadow-sm mx-auto" style="max-width: 500px; border-radius: 20px; overflow: hidden;">
            <div class="bg-primary text-white py-3">
                <h4 class="mb-0">Scan Classroom QR</h4>
            </div>
            <div class="card-body">
                <div id="reader" class="rounded mb-3" style="border: none;"></div>
                <div id="status" class="alert alert-info">Align the QR code within the frame</div>
            </div>
        </div>
    </div>

    <script>
        function startScanner() {
            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            
            function onScanSuccess(decodedText) {
                html5QrcodeScanner.clear();
                document.getElementById('status').className = "alert alert-warning";
                document.getElementById('status').innerText = "Verifying Location...";

                navigator.geolocation.getCurrentPosition((pos) => {
                    fetch('/verify_attendance', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            token: decodedText,
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        window.location.href = "/login"; // Go back to login after done
                    });
                }, (err) => {
                    alert("Please enable GPS/Location access.");
                });
            }
            html5QrcodeScanner.render(onScanSuccess);
        }
        window.onload = startScanner;
    </script>
</body>
</html>
