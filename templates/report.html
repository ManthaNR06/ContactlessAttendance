<!DOCTYPE html>
<html>
<head>
    <title>Attendance Report - {{ subject }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; transition: transform 0.2s; }
        .stats-card { background: linear-gradient(45deg, #0d6efd, #0048b3); }
        .percent-card { background: linear-gradient(45deg, #17a2b8, #117a8b); }
        .export-panel { display: none; }        
        .btn-action-custom { 
            font-size: 0.8rem;
            padding: 6px 14px;
            font-weight: 600;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        @media print { .btn, .navbar, .export-panel, .input-group, .action-col { display: none !important; } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-qr-code-scan"></i> Smart Attendance</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="javascript:history.back()"><i class="bi bi-arrow-left-circle"></i> Back</a>
      <a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
  </div>
</nav>

<div class="bg-white border-bottom py-4 mb-4 shadow-sm">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h1 class="h3 mb-1 text-dark fw-bold">{{ subject }}</h1>
                <p class="text-muted mb-0">Year: <span class="badge bg-secondary">{{ year }}</span></p>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <button onclick="toggleExportPanel()" class="btn btn-success px-4 me-2 shadow-sm">
                    <i class="bi bi-file-earmark-spreadsheet"></i> Export Excel
                </button>
                <button onclick="window.print()" class="btn btn-outline-dark px-4 shadow-sm">
                    <i class="bi bi-printer"></i> Print PDF
                </button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="exportPanel" class="card border-0 shadow-sm rounded-4 mb-4 export-panel">
        <div class="card-header bg-success text-white py-2 fw-bold small">Configure Export Range</div>
        <div class="card-body p-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-bold">From Date</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">To Date</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
                <div class="col-md-6 d-flex gap-2">
                    <button onclick="fetchAndDownload()" class="btn btn-primary flex-grow-1 fw-bold">Apply & Download</button>
                    <button onclick="setQuickDate('week')" class="btn btn-outline-primary">Last Week</button>
                    <button onclick="setQuickDate('month')" class="btn btn-outline-primary">Last Month</button>
                    <button onclick="toggleExportPanel()" class="btn btn-light">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card stats-card text-white shadow-sm rounded-4 h-100">
                <div class="card-body p-4 text-center">
                    <h6 class="text-uppercase small fw-bold opacity-75">Present Today</h6>
                    <h2 class="display-5 fw-bold mb-0" id="present-count">0 / 0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card percent-card text-white shadow-sm rounded-4 h-100">
                <div class="card-body p-4 text-center">
                    <h6 class="text-uppercase small fw-bold opacity-75">Attendance %</h6>
                    <h2 class="display-5 fw-bold mb-0" id="attendance-percentage">0%</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <div class="input-group shadow-sm rounded-3 overflow-hidden">
            <span class="input-group-text bg-white border-0"><i class="bi bi-search"></i></span>
            <input type="text" id="studentSearch" class="form-control border-0 p-3" placeholder="Search student name..." onkeyup="filterTable()">
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-5">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0" id="attendance-table">
                <thead class="table-dark">
                    <tr>
                        <th>Roll No</th> 
                        <th>Student Name</th>
                        <th>Class Year</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Coordinates</th>
                        <th class="action-col text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="attendance-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
    function formatToDMY(dateStr) {
        if (!dateStr || !dateStr.includes('-')) return dateStr;
        const [y, m, d] = dateStr.split('-');
        return `${d}-${m}-${y}`;
    }

    function toggleExportPanel() {
        const panel = document.getElementById('exportPanel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function fetchLiveUpdates() {
        fetch('/api/attendance_data').then(res => res.json()).then(data => {
            const now = new Date();
            const todayRaw = now.getFullYear() + '-' + 
                             String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                             String(now.getDate()).padStart(2, '0');
            const todayDisplay = formatToDMY(todayRaw);

            // 1. Update Header Stats
            const todayLogs = data.logs.filter(log => log.date === todayRaw);
            const presentCount = [...new Set(todayLogs.map(log => log.name))].length;
            document.getElementById('present-count').innerText = `${presentCount} / ${data.all_students.length}`;
            document.getElementById('attendance-percentage').innerText = 
                (data.all_students.length > 0 ? (presentCount / data.all_students.length * 100).toFixed(1) : 0) + '%';

            const tableBody = document.getElementById('attendance-table-body');
            let html = `<tr class="table-light"><td colspan="8" class="fw-bold text-center py-2">--- Today's Status: ${todayDisplay} ---</td></tr>`;

            // 2. Display Today's Full List (Same as before)
            data.all_students.forEach(student => {
                const log = todayLogs.find(l => l.name === student.name);
                const isPresent = !!log;

                html += `<tr>
                    <td>${student.roll_no}</td> 
                    <td><strong>${student.name}</strong></td>
                    <td>${student.class_year}</td>
                    <td>${todayDisplay}</td> 
                    <td>${isPresent ? log.time : '--:--'}</td>
                    <td><span class="badge ${isPresent ? 'bg-success' : 'bg-danger'}">${isPresent ? 'Present' : 'Absent'}</span></td>
                    <td class="text-muted small">${isPresent ? `<code>${log.lat}, ${log.lon}</code>` : 'N/A'}</td>
                    <td class="action-col">
                        <div class="d-flex justify-content-center gap-2">
                            ${!isPresent ? `
                                <form action="/manual_mark" method="POST"><input type="hidden" name="student_name" value="${student.name}"><button type="submit" class="btn btn-primary btn-action-custom"><i class="fas fa-check-circle"></i> Mark Attendance</button></form>
                            ` : `
                                <form action="/delete_attendance" method="POST"><input type="hidden" name="student_name" value="${student.name}"><button type="submit" class="btn btn-danger btn-action-custom"><i class="fas fa-undo"></i> Undo Attendance</button></form>
                            `}
                            <form action="/reset_device" method="POST"><input type="hidden" name="student_prn" value="${student.prn}"><button type="submit" class="btn btn-secondary btn-action-custom"><i class="fas fa-mobile-alt"></i> Reset Device ID</button></form>
                        </div>
                    </td>
                </tr>`;
            });

            // 3. Historical Data: Display ALL students for EACH past date
            const pastLogs = data.logs.filter(log => log.date !== todayRaw);
            
            // Get unique past dates and sort them descending (newest first)
            const uniqueDates = [...new Set(pastLogs.map(l => l.date))].sort().reverse();

            uniqueDates.forEach(date => {
                const dmy = formatToDMY(date);
                html += `<tr class="table-light"><td colspan="8" class="fw-bold text-center py-2">--- History: ${dmy} ---</td></tr>`;

                // For every date, check every student in the master list
                data.all_students.forEach(student => {
                    const log = pastLogs.find(l => l.date === date && l.name === student.name);
                    const isPresent = !!log;

                    html += `<tr>
                        <td>${student.roll_no}</td> 
                        <td>${student.name}</td>
                        <td>${student.class_year}</td> 
                        <td>${dmy}</td> 
                        <td>${isPresent ? log.time : '--:--'}</td>
                        <td><span class="badge ${isPresent ? 'bg-success' : 'bg-danger'}">${isPresent ? 'Present' : 'Absent'}</span></td>
                        <td class="text-muted small">${isPresent ? `<code>${log.lat}, ${log.lon}</code>` : 'N/A'}</td>
                        <td class="action-col text-center">
                            ${isPresent ? '<i class="fas fa-check-double text-success"></i>' : '<i class="fas fa-times text-danger"></i>'}
                        </td>
                    </tr>`;
                });
            });

            tableBody.innerHTML = html;
        });
    }

    function fetchAndDownload() {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    if(!start || !end) return alert("Please select dates.");

    // 1. Prepare clean data by cloning the table and removing the Action column
    const originalTable = document.getElementById("attendance-table");
    const tempTable = originalTable.cloneNode(true);
    tempTable.querySelectorAll('.action-col').forEach(col => col.remove());

    // 2. Convert table to a Worksheet
    const ws = XLSX.utils.table_to_sheet(tempTable);

    // 3. Define the range of the sheet to apply formatting
    const range = XLSX.utils.decode_range(ws['!ref']);

    // 4. Set Column Widths for better readability
    ws['!cols'] = [
        { wch: 8 },  // Roll No
        { wch: 25 }, // Student Name
        { wch: 15 }, // Class Year
        { wch: 15 }, // Date
        { wch: 12 }, // Time
        { wch: 10 }, // Status
        { wch: 30 }  // Coordinates
    ];

    // 5. Create a new Workbook and append the formatted sheet
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Attendance Report");

    // 6. Final Export
    XLSX.writeFile(wb, `Report_${formatToDMY(start)}_to_${formatToDMY(end)}.xlsx`);
    
    toggleExportPanel();
}

    function filterTable() {
        const q = document.getElementById("studentSearch").value.toUpperCase();
        document.querySelectorAll("#attendance-table-body tr:not(.table-light)").forEach(row => {
            row.style.display = row.innerText.toUpperCase().includes(q) ? "" : "none";
        });
    }

    function setQuickDate(range) {
        const end = new Date();
        const start = new Date();
        if (range === 'week') start.setDate(end.getDate() - 7);
        else start.setMonth(end.getMonth() - 1);
        document.getElementById('startDate').value = start.toISOString().split('T')[0];
        document.getElementById('endDate').value = end.toISOString().split('T')[0];
        fetchLiveUpdates();
    }

    document.addEventListener('DOMContentLoaded', fetchLiveUpdates);
    setInterval(fetchLiveUpdates, 10000);
</script>
</body>
</html>
